- hosts: jenkins
  become: yes

  tasks:    
    - name: Install main dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Make a keyrings dir
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download key GPG of Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
        update_cache: yes  
      
    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
    
    - name: Install Docker SDK for ansible
      apt:
        name: python3-docker
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
    
    - name: Make a volume for jenkins
      file:
        path: /var/jenkins_home
        state: directory
        owner: 1000
        group: 1000
        mode: "0755"    

    - name: Deploy Jenkins LTS
      community.docker.docker_container:
        name: jenkins
        image: jenkins/jenkins:lts
        restart_policy: unless-stopped
        user: root
        ports:
          - "8080:8080"
          - "50000:50000"
        volumes:
          - /var/jenkins_home:/var/jenkins_home
          - /var/run/docker.sock:/var/run/docker.sock
          - /usr/bin/docker:/usr/bin/docker
      